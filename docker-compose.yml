services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
      POSTGRES_DB: invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock_psp:
    build:
      context: .
      dockerfile: Dockerfile.mock_psp
    ports:
      - "8001:8001"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://invoice_user:invoice_pass@db:5432/invoice_db
      DATABASE_URL_SYNC: postgresql+psycopg2://invoice_user:invoice_pass@db:5432/invoice_db
      REDIS_URL: redis://redis:6379/0
      PSP_URL: http://mock_psp:8001/charge
      SECRET_KEY: change-me-in-production
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock_psp:
        condition: service_started
    volumes:
      - ./app:/app/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: